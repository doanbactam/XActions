server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (mirrors dashboard/_headers)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Marketing landing page at the root (matches the vercel.json fallthrough
    # that served site/index.html); the app dashboard lives at /dashboard
    location = / {
        try_files /landing.html =404;
    }
    location = /dashboard {
        try_files /index.html =404;
    }

    # API backend is not deployed yet: fail fast with JSON instead of an
    # HTML 404 so dashboard fetch() calls surface a clear error
    location /api/ {
        default_type application/json;
        return 503 '{"error":"API temporarily unavailable","status":503}';
    }

    # /blog/ has no index page; the blog landing page is /blog.html
    location = /blog/ {
        return 301 /blog;
    }

    # Clean URLs: /about -> /about.html, /tutorials -> /tutorials/index.html
    location / {
        try_files $uri $uri.html $uri/index.html $uri/ =404;
    }

    # Long-cache immutable assets (mirrors dashboard/_headers)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    error_page 404 /404.html;
}
